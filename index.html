<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stuckert Stars</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: #fff; min-height: 100vh; padding: 20px 16px 60px; max-width: 500px; margin: 0 auto; }
h1 { font-size: 26px; font-weight: 800; color: #1a1a1a; text-align: center; margin-bottom: 4px; }
.subtitle { text-align: center; color: #bbb; font-size: 12px; font-style: italic; margin-bottom: 24px; }

.kid-card { border-radius: 16px; padding: 18px 16px 16px; background: #fafafa; border: 1.5px solid #eee; border-left: 6px solid #ccc; margin-bottom: 18px; position: relative; overflow: hidden; }
.kid-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.kid-name { font-size: 23px; font-weight: 800; }
.kid-emoji { font-size: 22px; }
.kid-count { font-size: 23px; font-weight: 800; }
.kid-stars { font-size: 26px; line-height: 1.55; letter-spacing: 2px; word-break: break-all; min-height: 38px; margin-bottom: 16px; }
.btn-row { display: flex; gap: 12px; margin-bottom: 10px; }
.btn-minus, .btn-plus { flex: 1; height: 80px; border-radius: 16px; font-size: 44px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; }
.btn-reset { width: 100%; padding: 13px 0; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: Georgia, serif; background: #fff; border: 1.5px solid #e0e0e0; color: #aaa; }
.btn-reset:disabled { opacity: 0.25; }

.confirm-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.97); border-radius: 16px; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 20px; z-index: 10; }
.confirm-overlay.show { display: flex; }
.confirm-msg { font-size: 16px; font-weight: 700; color: #333; text-align: center; }
.confirm-btns { display: flex; gap: 10px; width: 100%; }
.confirm-yes { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; font-family: Georgia, serif; color: #fff; }
.confirm-no  { flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd; background: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: Georgia, serif; color: #888; }

hr { border: none; border-top: 1px solid #f0f0f0; margin: 18px 0; }
.activity-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.section-label { font-size: 11px; font-weight: 700; color: #bbb; letter-spacing: 1.2px; text-transform: uppercase; }
.btn-clear-log { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; font-family: Georgia, serif; padding: 0; }
.btn-clear-log:hover { color: #999; }
.activity-list { max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
.activity-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: #fafafa; border: 1px solid #f0f0f0; font-size: 13px; }
.badge { width: 24px; height: 24px; border-radius: 6px; font-size: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.a-name { font-weight: 600; min-width: 58px; }
.a-desc { flex: 1; color: #777; }
.a-time { color: #bbb; font-size: 11px; }
.day-sep { font-size: 11px; font-weight: 700; color: #bbb; letter-spacing: 1px; text-transform: uppercase; padding: 8px 2px 4px; }
</style>
</head>
<body>

<h1>⭐ Stuckert Stars</h1>
<p class="subtitle">track · reset · report</p>

<div id="kid-cards"></div>

<hr>
<div class="activity-header">
  <div class="section-label">Recent Activity</div>
  <button class="btn-clear-log" id="btn-clear-log">↺ Clear</button>
</div>
<div class="activity-list" id="activity-list"></div>

<script>
var KIDS = [
  { name: "Darrow", emoji: "⚔️",  color: "#e05555" },
  { name: "Rowen",  emoji: "🧌",  color: "#3a9e6e" },
  { name: "Maven",  emoji: "👸",  color: "#c85b8a" }
];

function loadData(key, fallback) {
  try { var s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
  catch(e) { return fallback; }
}
function saveData() {
  localStorage.setItem("sc_stars",    JSON.stringify(stars));
  localStorage.setItem("sc_activity", JSON.stringify(activityLog));
}

var stars       = loadData("sc_stars",    { Darrow: 4, Rowen: 3, Maven: 2 });
var activityLog = loadData("sc_activity", []);

// Clear activity log
document.getElementById("btn-clear-log").addEventListener("click", function() {
  activityLog = [];
  saveData();
  renderActivity();
});

function addStar(name) {
  stars[name] = (stars[name] || 0) + 1;
  activityLog.unshift({ id: Date.now(), name: name, delta: 1, ts: Date.now() });
  if (activityLog.length > 1000) activityLog = activityLog.slice(0, 1000);
  saveData();
  renderTracker();
}

function removeStar(name) {
  if ((stars[name] || 0) === 0) return;
  stars[name] = stars[name] - 1;
  activityLog.unshift({ id: Date.now(), name: name, delta: -1, ts: Date.now() });
  if (activityLog.length > 1000) activityLog = activityLog.slice(0, 1000);
  saveData();
  renderTracker();
}

function doReset(name) {
  var count = stars[name] || 0;
  if (!count) return;
  activityLog.unshift({ id: Date.now(), name: name, delta: -count, ts: Date.now(), reset: true });
  if (activityLog.length > 1000) activityLog = activityLog.slice(0, 1000);
  stars[name] = 0;
  saveData();
  renderTracker();
}

function renderTracker() {
  var container = document.getElementById("kid-cards");
  container.innerHTML = "";

  KIDS.forEach(function(kid) {
    var name  = kid.name;
    var color = kid.color;
    var count = stars[name] || 0;

    var card = document.createElement("div");
    card.className = "kid-card";
    card.style.borderLeftColor = color;

    // Header
    var header = document.createElement("div");
    header.className = "kid-header";
    var nameEl = document.createElement("span");
    nameEl.className = "kid-name";
    nameEl.style.color = color;
    nameEl.textContent = name;
    var emojiEl = document.createElement("span");
    emojiEl.className = "kid-emoji";
    emojiEl.textContent = kid.emoji;
    var countEl = document.createElement("span");
    countEl.className = "kid-count";
    countEl.style.color = color;
    countEl.textContent = count > 0 ? count : "";
    header.appendChild(nameEl);
    header.appendChild(emojiEl);
    header.appendChild(countEl);

    // Stars
    var starsEl = document.createElement("div");
    starsEl.className = "kid-stars";
    if (count === 0) {
      starsEl.innerHTML = '<span style="color:#ccc;font-size:14px">no stars yet</span>';
    } else {
      starsEl.textContent = "⭐".repeat(count);
    }

    // +/- buttons
    var btnRow = document.createElement("div");
    btnRow.className = "btn-row";

    var minusBtn = document.createElement("button");
    minusBtn.className = "btn-minus";
    minusBtn.textContent = "−";
    if (count === 0) {
      minusBtn.disabled = true;
      minusBtn.style.cssText = "background:#f0f0f0;color:#ccc;border:3px solid #e8e8e8;";
    } else {
      minusBtn.style.cssText = "background:#fff;color:"+color+";border:3px solid "+color+";";
      (function(n){ minusBtn.addEventListener("click", function(){ removeStar(n); }); })(name);
    }

    var plusBtn = document.createElement("button");
    plusBtn.className = "btn-plus";
    plusBtn.textContent = "+";
    plusBtn.style.cssText = "background:"+color+";color:#fff;";
    (function(n){ plusBtn.addEventListener("click", function(){ addStar(n); }); })(name);

    btnRow.appendChild(minusBtn);
    btnRow.appendChild(plusBtn);

    // Reset button
    var resetBtn = document.createElement("button");
    resetBtn.className = "btn-reset";
    resetBtn.textContent = "↺ Reset";
    if (count === 0) {
      resetBtn.disabled = true;
    } else {
      resetBtn.style.color = "#666";
      resetBtn.style.borderColor = "#ccc";
    }

    // Confirm overlay
    var overlay = document.createElement("div");
    overlay.className = "confirm-overlay";
    var msg = document.createElement("div");
    msg.className = "confirm-msg";
    var confirmBtns = document.createElement("div");
    confirmBtns.className = "confirm-btns";
    var yesBtn = document.createElement("button");
    yesBtn.className = "confirm-yes";
    yesBtn.textContent = "Yes, Reset";
    yesBtn.style.background = color;
    var noBtn = document.createElement("button");
    noBtn.className = "confirm-no";
    noBtn.textContent = "Cancel";
    noBtn.addEventListener("click", function(){ overlay.classList.remove("show"); });
    confirmBtns.appendChild(yesBtn);
    confirmBtns.appendChild(noBtn);
    overlay.appendChild(msg);
    overlay.appendChild(confirmBtns);

    resetBtn.addEventListener("click", function(){
      msg.textContent = "Reset " + name + "'s " + (stars[name]||0) + " star" + ((stars[name]||0) !== 1 ? "s" : "") + "?";
      overlay.classList.add("show");
    });
    (function(n){ yesBtn.addEventListener("click", function(){ overlay.classList.remove("show"); doReset(n); }); })(name);

    card.appendChild(header);
    card.appendChild(starsEl);
    card.appendChild(btnRow);
    card.appendChild(resetBtn);
    card.appendChild(overlay);
    container.appendChild(card);
  });

  renderActivity();
}

function renderActivity() {
  var list = document.getElementById("activity-list");
  list.innerHTML = "";

  if (!activityLog.length) {
    list.innerHTML = '<p style="color:#ccc;font-size:13px;text-align:center;padding:16px 0">No activity yet</p>';
    return;
  }

  var twoWeeksAgo = Date.now() - (14 * 24 * 60 * 60 * 1000);
  var recent = activityLog.filter(function(e){ return e.ts >= twoWeeksAgo; });

  if (!recent.length) {
    list.innerHTML = '<p style="color:#ccc;font-size:13px;text-align:center;padding:16px 0">No activity in the past 2 weeks</p>';
    return;
  }

  var today     = new Date(); today.setHours(0,0,0,0);
  var yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);

  function dayLabel(ts) {
    var d = new Date(ts); d.setHours(0,0,0,0);
    if (d.getTime() === today.getTime())     return "Today";
    if (d.getTime() === yesterday.getTime()) return "Yesterday";
    return d.toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" });
  }

  var lastLabel = null;
  recent.forEach(function(e) {
    var label = dayLabel(e.ts);
    if (label !== lastLabel) {
      var sep = document.createElement("div");
      sep.className = "day-sep";
      if (lastLabel) sep.style.borderTop = "1px solid #f5f5f5";
      sep.textContent = label;
      list.appendChild(sep);
      lastLabel = label;
    }

    var kid   = KIDS.find(function(k){ return k.name === e.name; });
    var color = kid ? kid.color : "#888";
    var bg    = e.reset ? "#f3e5f5" : e.delta > 0 ? "#e8f5e9" : "#fce4ec";
    var icon  = e.reset ? "↺" : e.delta > 0 ? "+" : "−";
    var desc  = e.reset  ? "reset " + Math.abs(e.delta) + " stars"
              : (e.delta > 0 ? "+" : "") + e.delta + " star" + (Math.abs(e.delta) !== 1 ? "s" : "");
    var time  = new Date(e.ts).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });

    var item = document.createElement("div");
    item.className = "activity-item";
    item.innerHTML = '<div class="badge" style="background:' + bg + '">' + icon + '</div>'
      + '<span class="a-name" style="color:' + color + '">' + e.name + '</span>'
      + '<span class="a-desc">' + desc + '</span>'
      + '<span class="a-time">' + time + '</span>';
    list.appendChild(item);
  });
}

function fmtShort(ts){ return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

renderTracker();
</script>
</body>
</html>
